services:
  mlflow:
    build:
      context: .
      dockerfile: Dockerfile
    image: mlflow:latest
    container_name: mlflow
    ports:
      - "5000:5000"
    volumes:
      - ./mlflow_data:/mlflow
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - POSTGRES_URI=postgresql://postgres:megapassword@postgres:5432/mlflowdb
      - MLFLOW_BACKEND_STORE_URI=postgresql://postgres:megapassword@postgres:5432/mlflowdb
      - MLFLOW_DEFAULT_ARTIFACT_ROOT=/mlflow/artifacts
    depends_on:
      - postgres
    networks:
      - ml_net

  postgres:
    image: postgres:latest
    container_name: postgres
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=megapassword
      - POSTGRES_DB=mlflowdb
    ports:
      - "5432:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql
    networks:
      - ml_net

networks:
  ml_net:
    driver: bridge