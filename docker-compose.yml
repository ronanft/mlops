services:
  mlflow:
    build:
      context: .
      dockerfile: Dockerfile
    image: mlflow:latest
    container_name: mlflow
    ports:
      - "5000:5000"
    volumes:
      - ./mlflow_data:/mlflow # A 1a é a pasta no host, a 2a é a pasta no container
    env_file:
      - .env
    environment:
      - MLFLOW_TRACKING_URI=${MLFLOW_TRACKING_URI}
      - POSTGRES_URI=${POSTGRES_URI}
      - MLFLOW_BACKEND_STORE_URI=${MLFLOW_BACKEND_STORE_URI}
      - MLFLOW_DEFAULT_ARTIFACT_ROOT=mlflow-artifacts:/mlflow
    depends_on:
      - postgres
    networks:
      - ml_net

  postgres:
    image: postgres:latest
    container_name: postgres
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql
    networks:
      - ml_net

  redis:
    image: redis:latest
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - ml_net

  streamlit:
    build:
      context: .
      dockerfile: Dockerfile.app
    container_name: streamlit
    ports:
      - "8501:8501"
    volumes:
      - ./:/app
    env_file:
      - .env
    environment:
      # Ajustamos o host do redis e postgres para referenciar os containers do compose
      - REDIS_HOST=redis
      - POSTGRES_LOCAL_URI=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - TRANSCRIBE_URL=${TRANSCRIBE_URL}
    depends_on:
      - postgres
      - redis
    command: streamlit run src/app.py
    networks:
      - ml_net

  rq_worker:
    build:
      context: .
      dockerfile: Dockerfile.app
    container_name: rq_worker
    volumes:
      - ./:/app
    env_file:
      - .env
    environment:
      - REDIS_HOST=redis
      - POSTGRES_LOCAL_URI=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - TRANSCRIBE_URL=${TRANSCRIBE_URL}
      - PYTHONPATH=/app/src
    depends_on:
      - postgres
      - redis
    command: rq worker transcription_queue --url redis://redis:${REDIS_PORT}/
    networks:
      - ml_net

  # Monitoring Services
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    networks:
      - ml_net

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3030:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3030
    depends_on:
      - prometheus
    networks:
      - ml_net

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    ports:
      - "9100:9100"
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    networks:
      - ml_net

networks:
  ml_net:
    driver: bridge

volumes:
  mlflow-artifacts:
  prometheus-data:
  grafana-data:
